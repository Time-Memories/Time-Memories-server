spring.application.name=memories
spring.profiles.active=dev

# swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (secret must be at least 32 bytes; override JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:time-memories-secret-key-must-be-at-least-32bytes!}
jwt.access-token-expiry=1800000
jwt.refresh-token-expiry=604800000

# AWS S3
aws.s3.region=ap-northeast-2
aws.cloudfront.domain=d2u0ocp0437og0.cloudfront.net